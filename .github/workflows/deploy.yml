name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # refresh market data 3x/day — keeps Alpha Vantage usage (~7 req/run)
    # under its 25 req/day free cap; committed JSON files are the fallback
    - cron: '23 5,13,21 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # refresh ticker + dashboard data; on failure the committed seeds ship instead
      - run: npm run market || echo "market fetch failed, shipping seed data"
        env:
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
      - run: npm run avdata || echo "AV dashboard fetch failed, shipping seed data"
        env:
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
      - run: npm run build
      # SPA fallback so /blog/some-post deep links work on Pages
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
